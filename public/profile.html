<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Flow</title>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/animations.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 40px auto;
        }
        .avatar-grid {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .avatar-option.selected {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transform: scale(1.1);
        }
        .stat-card {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container" style="display: block; overflow-y: auto;">
        <!-- Top Navigation -->
        <header class="app-header">
            <a href="/" class="logo" style="text-decoration: none; color: var(--text-primary);">FLOW</a>
            <div style="display: flex; gap: 16px; align-items: center;">
                <button id="logout-btn" class="btn btn-outline" style="padding: 6px 12px;">Logout</button>
            </div>
        </header>

        <div class="profile-container">
            <h1 style="margin-bottom: 24px; font-weight: 800; font-size: 2.5rem; color: var(--primary);">Your Profile</h1>

            <div class="brutal-card scale-in" style="margin-bottom: 24px;">
                <h3 style="margin-bottom: 16px;">Statistics</h3>
                <div style="display: flex; gap: 16px;">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-focus">0h 0m</div>
                        <div class="text-muted">Total Focus Time</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-sessions">0</div>
                        <div class="text-muted">Focus Sessions</div>
                    </div>
                </div>
            </div>

            <div class="brutal-card scale-in" style="animation-delay: 0.1s;">
                <h3 style="margin-bottom: 16px;">Customize</h3>
                
                <div style="margin-bottom: 20px;">
                    <label class="text-muted" style="display: block; margin-bottom: 8px;">Username</label>
                    <input type="text" id="username-input" class="brutal-input" placeholder="Your username...">
                </div>

                <div style="margin-bottom: 24px;">
                    <label class="text-muted" style="display: block; margin-bottom: 8px;">Avatar</label>
                    <div class="avatar-grid" id="avatar-picker">
                        <!-- Avatars populated by JS -->
                    </div>
                </div>

                <button id="save-btn" class="btn btn-primary" style="width: 100%;">Save Changes</button>
                <div id="status-msg" style="margin-top: 12px; text-align: center; font-weight: 600;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/profile.js"></script>
</body>
</html>
