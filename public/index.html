<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow | Study Better. Together.</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/components.css">
    
    <!-- Auth Guard -->
    <script>
        // Check if user is logged in
        const user = localStorage.getItem('flow_user');
        if (!user) {
            window.location.href = '/login.html';
        }
    </script>
</head>
<body>

    <!-- Modals Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <!-- Join Room Modal -->
        <div id="join-modal" class="modal brutal-card">
            <h2 style="margin-bottom: 8px;">Welcome to Flow.</h2>
            <p style="margin-bottom: 16px; font-weight: 500;">Host a new session or join an existing room.</p>
            
            <input type="text" id="room-code-input" class="input-field" placeholder="Room Code (if joining)" maxlength="6" style="margin-bottom: 16px; text-transform: uppercase;">
            <input type="password" id="room-pin-input" class="input-field" placeholder="Optional PIN (4 digits)" maxlength="4" style="margin-bottom: 16px;">
            
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button id="join-btn" class="btn btn-primary" style="flex: 1;">Join Room</button>
                <button id="host-btn" class="btn btn-secondary" style="flex: 1;">Host Room</button>
            </div>
            
            <div style="text-align: center; margin-top: 16px;">
                <a href="#" id="logout-link" style="color: var(--text-muted); font-size: 14px; text-decoration: underline;">Log out</a>
            </div>
        </div>
        
        <!-- Timer Settings Modal -->
        <div id="timer-settings-modal" class="modal brutal-card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0; font-size: 1.25rem;">Timer Settings</h2>
                <button id="close-timer-settings-btn" class="icon-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            
            <div class="settings-group mb-2">
                <label style="font-weight: 600;">Focus (minutes)</label>
                <input type="number" id="setting-focus-duration" class="brutal-input mt-1" value="25" min="1" max="120">
            </div>
            <div class="settings-group mb-2">
                <label style="font-weight: 600;">Short Break (minutes)</label>
                <input type="number" id="setting-short-break-duration" class="brutal-input mt-1" value="5" min="1" max="60">
            </div>
            <div class="settings-group mb-4">
                <label style="font-weight: 600;">Long Break (minutes)</label>
                <input type="number" id="setting-long-break-duration" class="brutal-input mt-1" value="15" min="1" max="60">
            </div>
            <button id="save-timer-settings-btn" class="btn btn-primary">Save Changes</button>
        </div>
        
        <!-- Timer Alert Modal -->
        <div id="timer-alert-modal" class="modal brutal-card hidden" style="text-align: center;">
            <h2 id="timer-alert-title" style="margin-bottom: 12px; font-size: 1.5rem;">Time's Up!</h2>
            <p id="timer-alert-msg" style="margin-bottom: 24px; font-weight: 500; font-size: 1.1rem; color: var(--text-secondary);">Great focus session.</p>
            <button id="close-timer-alert-btn" class="btn btn-primary" style="width: 100%;">Okay!</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="app" class="app-container hidden">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">FLOW</div>
                <div class="room-info">
                    <span id="room-name">Room: <span class="highlight" id="header-room-code">----</span></span>
                    <span class="participant-count"><span class="dot green"></span> <span id="count">1</span> Online</span>
                </div>
            </div>
            <div class="header-right" style="display: flex; gap: 8px; align-items: center;">
                <select id="theme-picker" class="brutal-input" style="padding: 4px 8px; font-size: 14px; margin-right: 8px; cursor: pointer;">
                    <option value="forest">Forest</option>
                    <option value="midnight">Midnight</option>
                    <option value="warm">Warm</option>
                </select>
                <button id="share-link-btn" class="btn btn-secondary">Copy Link</button>
                <button id="leave-btn" class="btn btn-danger">Leave</button>
            </div>
        </header>

        <div class="workspace-grid">
            <!-- LEFT SIDEBAR -->
            <aside class="sidebar left-sidebar">
                <!-- User Profile / Presence Card -->
                <div class="brutal-card profile-card" id="my-presence-card">
                    <div class="profile-header">
                        <div class="avatar" id="my-avatar">?</div>
                        <div class="profile-info">
                            <h3 id="my-username">You</h3>
                            <div class="status-indicator">
                                <span class="dot green"></span>
                                <span id="my-status-text">Online</span>
                            </div>
                            <div id="my-focus-time" style="font-size: 12px; margin-top: 4px; color: var(--text-muted);">Today: 0m focused</div>
                        </div>
                    </div>
                </div>

                <!-- Partner Presence Cards -->
                <div id="partner-presence-container" style="display:flex; flex-direction:column; gap:16px;"></div>
                
                <!-- YouTube Embed -->
                <div class="brutal-card p-0" style="padding: 8px; overflow: hidden; flex-shrink: 0; margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="youtube-url-input" class="brutal-input" placeholder="Paste YouTube Link..." style="flex: 1; padding: 6px; font-size: 12px;">
                        <button id="sync-youtube-btn" class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;">Sync</button>
                    </div>
                    <iframe id="youtube-iframe" style="display:block; border-radius: var(--radius-sm);" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1" width="100%" height="152" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </aside>

            <!-- CENTER STAGE: Video Grid -->
            <main class="main-workspace center-stage">
                <div class="video-grid" id="video-grid">
                    <div class="video-wrapper">
                        <video id="local-video" autoplay muted playsinline></video>
                        <span class="name-tag">You</span>
                        <div class="dummy-placeholder hidden" id="local-dummy-placeholder">
                             <div class="avatar" style="width:64px; height:64px; font-size:2rem; border-radius:50%;" id="local-dummy-avatar">?</div>
                             <div class="text">Camera Unavailable</div>
                        </div>
                        <div style="position: absolute; bottom: 12px; right: 12px; display: flex; gap: 8px; z-index: 20;">
                            <button id="toggle-mic" class="icon-btn active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                            <button id="toggle-cam" class="icon-btn active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
                        </div>
                    </div>
                </div>
            </main>

            <!-- RIGHT SIDEBAR -->
            <aside class="sidebar right-sidebar">
                
                <!-- Dynamic Island Timer -->
                <div class="pill-timer">
                    <div class="time-display" id="time-display">25:00</div>
                    
                    <div class="timer-modes">
                        <button class="mode-btn active" data-mode="focus">Focus</button>
                        <button class="mode-btn" data-mode="shortBreak">Break</button>
                        <button class="mode-btn" data-mode="longBreak">Long</button>
                    </div>

                    <div style="display: flex; gap: 6px;">
                        <button id="focus-mode-toggle" class="icon-btn" style="width: 32px; height: 32px; border-radius: 50%;" title="Toggle Focus Mode"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
                        <button id="timer-toggle-btn" class="icon-btn" style="width: 32px; height: 32px; border-radius: 50%;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                        <button id="timer-reset-btn" class="icon-btn" style="width: 32px; height: 32px; border-radius: 50%;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-8.31l5.67-5.67"/></svg></button>
                        <button id="open-timer-settings-btn" class="icon-btn" style="width: 32px; height: 32px; border-radius: 50%;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
                    </div>
                </div>

                <!-- Tabbed Panel -->
                <div class="brutal-card tabbed-container p-0">
                    <div class="tabs-header">
                        <button class="tab-btn active" data-tab="tasks-tab">ROOM TASKS</button>
                        <button class="tab-btn" data-tab="chat-tab">ROOM CHAT</button>
                    </div>

                    <!-- Tasks Tab (NO INLINE STYLES!) -->
                    <div id="tasks-tab" class="tab-content active">
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="new-task-input" class="brutal-input" placeholder="Add a shared task..." maxlength="100">
                            <button id="add-task-btn" class="btn btn-primary">+</button>
                        </div>
                        
                        <!-- Progress -->
                        <div class="task-progress-bar mt-4 mb-4" style="position: relative;">
                            <span id="room-task-progress-text" style="font-size: 12px; font-weight: bold; position: absolute; right: 0; top: -20px; color: var(--text-secondary);">0%</span>
                            <div id="room-task-progress-fill" class="task-progress-fill" style="width: 0%;"></div>
                        </div>

                        <ul class="task-list" id="room-task-list">
                            <!-- Tasks injected here -->
                        </ul>
                    </div>

                    <!-- Chat Tab (NO INLINE STYLES!) -->
                    <div id="chat-tab" class="tab-content">
                        <div id="chat-messages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding-right: 4px;">
                            <!-- Messages injected here -->
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="chat-input" class="brutal-input" placeholder="/ai to ask bot..." maxlength="300">
                            <button id="send-chat-btn" class="btn btn-primary">Send</button>
                        </div>
                    </div>
                </div>

            </aside>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
