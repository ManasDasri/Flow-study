<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow | Login</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/components.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-main);
            /* Retro grid */
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }

        .logo-large {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--border-color);
            margin-bottom: 8px;
            text-shadow: 4px 4px 0px var(--primary);
        }

        .subtitle {
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 1.1rem;
        }
        
        .error-msg {
            color: var(--danger);
            font-weight: 700;
            margin-top: 12px;
            font-size: 0.9rem;
            display: none;
        }
        
        .success-msg {
            color: var(--green);
            font-weight: 700;
            margin-top: 12px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="brutal-card login-card scale-in">
        <div class="logo-large">FLOW</div>
        <p class="subtitle" id="subtitle-text">Enter your email to log in or sign up.</p>
        
        <!-- Step 1: Email Input -->
        <div id="step-email">
            <input type="email" id="email-input" class="brutal-input mb-4" placeholder="you@example.com" required>
            <button id="send-code-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px;">
                Send Login Code
            </button>
        </div>

        <!-- Step 2: OTP Input (Hidden initially) -->
        <div id="step-otp" class="hidden">
            <input type="text" id="otp-input" class="brutal-input mb-4" placeholder="6-digit code" style="text-align: center; font-size: 1.2rem; letter-spacing: 4px;" maxlength="6">
            <button id="verify-code-btn" class="btn btn-secondary" style="width: 100%; font-size: 1.1rem; padding: 14px;">
                Verify Code
            </button>
            <button id="back-btn" class="btn mt-4" style="background: transparent; border: none; box-shadow: none; color: var(--text-secondary); text-decoration: underline;">
                Back to email
            </button>
        </div>

        <div id="error-message" class="error-msg"></div>
        <div id="success-message" class="success-msg">Code sent to your email!</div>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/login.js"></script>
</body>
</html>
